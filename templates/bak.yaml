id: bak-file-exposure
info:
  name: Backup File Exposure Check
  author: user
  severity: high
http:
  - method: GET
    path:
      - "{{BaseURL}}/wp-config.php.bak"
      - "{{BaseURL}}/.env.bak"
    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        words:
          - "DB_PASSWORD"
          - "APP_KEY"
        condition: or
